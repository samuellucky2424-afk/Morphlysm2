<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Reset Morphly password</title>
  <style>
    :root { color-scheme: dark; font-family: system-ui, sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #090b0f; color: #f4f5f7; }
    main { width: min(420px, calc(100% - 32px)); padding: 28px; border: 1px solid #2a2f3a; border-radius: 16px; background: #11151c; box-sizing: border-box; }
    h1 { margin: 0 0 8px; font-size: 24px; }
    p { color: #aab2c0; line-height: 1.5; }
    label { display: block; margin: 18px 0 6px; font-size: 13px; color: #c8ced9; }
    input, button { width: 100%; min-height: 46px; border-radius: 9px; box-sizing: border-box; font: inherit; }
    input { padding: 0 12px; border: 1px solid #384152; background: #080b10; color: #fff; }
    button { margin-top: 18px; border: 0; background: #e7b94c; color: #151006; font-weight: 750; cursor: pointer; }
    button:disabled { opacity: .55; cursor: wait; }
    #status { min-height: 24px; font-size: 14px; }
    .error { color: #ff8080; }
    .success { color: #70e5a0; }
  </style>
</head>
<body>
  <main>
    <h1>Reset your password</h1>
    <p id="intro">Enter a new Morphly password.</p>
    <form id="resetForm">
      <label for="password">New password</label>
      <input id="password" type="password" minlength="8" maxlength="128" autocomplete="new-password" required>
      <label for="confirmPassword">Confirm password</label>
      <input id="confirmPassword" type="password" minlength="8" maxlength="128" autocomplete="new-password" required>
      <button id="submitButton" type="submit">Update password</button>
    </form>
    <p id="status" role="status" aria-live="polite"></p>
  </main>
  <script>
    (() => {
      const params = new URLSearchParams(location.hash.slice(1));
      const token = params.get('access_token') || '';
      history.replaceState(null, '', location.pathname);
      const form = document.getElementById('resetForm');
      const status = document.getElementById('status');
      const button = document.getElementById('submitButton');
      if (!token || params.get('type') !== 'recovery') {
        form.hidden = true;
        status.className = 'error';
        status.textContent = 'This recovery link is invalid or expired. Request a new link in the Morphly app.';
        return;
      }
      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const password = document.getElementById('password').value;
        const confirmation = document.getElementById('confirmPassword').value;
        if (password !== confirmation) {
          status.className = 'error';
          status.textContent = 'The passwords do not match.';
          return;
        }
        button.disabled = true;
        status.className = '';
        status.textContent = 'Updating...';
        try {
          const response = await fetch('/api/update-password', {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${token}`,
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ password }),
          });
          const data = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(data.error || 'Password update failed.');
          form.hidden = true;
          status.className = 'success';
          status.textContent = data.message;
        } catch (error) {
          status.className = 'error';
          status.textContent = error.message;
          button.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
